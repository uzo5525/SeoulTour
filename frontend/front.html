<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>서울 관광 지수 탐색</title>
  <link rel="stylesheet" type="text/css" href="main.css">
</head>

<body>

    <!-- 위쪽 슬라이드 바 -->
    <div id="slidebar">
        <h2>관광지 탐색</h2>
        <label>대중 ↔ 로컬 (α)</label>
        <input type="range" id="alphaSlider" min="0" max="1" step="0.01" value="0.5" />
        <span id="alphaValue">0.5</span>
    </div>

    <!-- 지도 -->
    <div id="map"></div>

    <!-- 장소 & 지수 -->
    <div id="places-list">
        <p>관광지 목록이 여기에 표시됩니다.</p>
    </div>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=658c9860f3e457950fbdb03131c9dc48"></script>
  <script src="main.js"></script>

</body>
</html>
